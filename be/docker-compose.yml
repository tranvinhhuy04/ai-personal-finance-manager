services:
  mongo-db:
    image: mongo:7
    container_name: mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - fintech_net

  redis-cache:
    image: redis:7
    container_name: redis-cache
    restart: always
    networks:
      - fintech_net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - redis-cache
    env_file:
      - .env
    networks:
      - fintech_net

  service-identity:
    build: ./service-identity
    container_name: service-identity
    restart: always
    expose:
      - "3001"
    depends_on:
      - mongo-db
    env_file:
      - .env
    environment:
      IDENTITY_PORT: 3001
      MONGO_URI: mongodb://mongo-db:27017/fintech_auth
    networks:
      - fintech_net

  service-wallet:
    build: ./service-wallet
    container_name: service-wallet
    restart: always
    expose:
      - "3002"
    env_file:
      - .env
    networks:
      - fintech_net

volumes:
  mongodata:

networks:
  fintech_net:
    driver: bridge

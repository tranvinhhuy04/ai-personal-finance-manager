services:
  # Database: MongoDB
  mongo-db:
    image: mongo:7
    container_name: mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    networks:
      - fintech_net
    # Health check: ping MongoDB every 10s; mark healthy after 3 successes
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Cache: Redis
  redis-cache:
    image: redis:7
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fintech_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Message Broker: RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - fintech_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # API Gateway (Port 3000)
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      redis-cache:
        condition: service_healthy
      service-identity:
        condition: service_started
      service-wallet:
        condition: service_started
      service-transaction:
        condition: service_started
      analytics-service:
        condition: service_started
      notification-service:
        condition: service_started
    env_file:
      - .env
    environment:
      PORT: 3000
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      REDIS_URL: redis://redis-cache:6379
      IDENTITY_SERVICE_URL: http://service-identity:3001
      WALLET_SERVICE_URL: http://service-wallet:3002
      TRANSACTION_SERVICE_URL: http://service-transaction:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    networks:
      - fintech_net

  # Identity Service (Port 3001)
  service-identity:
    build: ./service-identity
    container_name: service-identity
    restart: on-failure
    ports:
      - "3001:3001"
    depends_on:
      mongo-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
    networks:
      - fintech_net

  # Wallet Service (Port 3002)
  service-wallet:
    build: ./service-wallet
    container_name: service-wallet
    restart: on-failure
    ports:
      - "3002:3002"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      WALLET_PORT: 3002
      MONGO_URI_WALLET: ${MONGO_URI}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - fintech_net

  # Transaction Service (Port 3003)
  service-transaction:
    build: ./service-transaction
    container_name: service-transaction
    restart: on-failure
    ports:
      - "3003:3003"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      TRANSACTION_PORT: 3003
      MONGO_URI_TRANSACTION: ${MONGO_URI}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - fintech_net

  # Analytics Service (Port 3004)
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    restart: on-failure
    ports:
      - "3004:3004"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      ANALYTICS_PORT: 3004
      MONGO_URI_ANALYTICS: ${MONGO_URI}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - fintech_net

  # Notification Service (Port 3005)
  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: on-failure
    ports:
      - "3005:3005"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NOTIFICATION_PORT: 3005
      MONGO_URI_NOTIFICATION: ${MONGO_URI}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - fintech_net

volumes:
  mongodata:
  rabbitmqdata:

networks:
  fintech_net:
    driver: bridge

services:
  # Database: MongoDB
  mongo-db:
    image: mongo:7
    container_name: mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    networks:
      - fintech_net
    # Health check: ping MongoDB every 10s; mark healthy after 3 successes
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Cache: Redis
  redis-cache:
    image: redis:7
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fintech_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Message Broker: RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - fintech_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # API Gateway (Port 3000)
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      redis-cache:
        condition: service_healthy
      service-identity:
        condition: service_started
      service-wallet:
        condition: service_started
      service-transaction:
        condition: service_started
      analytics-service:
        condition: service_started
      notification-service:
        condition: service_started
      ai-service:
        condition: service_started
    env_file:
      - ./api-gateway/.env
    environment:
      PORT: 3000
      NODE_ENV: development
      RATE_LIMIT_MAX_DEV: 1000
      DISABLE_RATE_LIMIT_IN_DEV: "false"
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      REDIS_URL: redis://redis-cache:6379
      IDENTITY_SERVICE_URL: http://service-identity:3001
      WALLET_SERVICE_URL: http://service-wallet:3002
      TRANSACTION_SERVICE_URL: http://service-transaction:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      AI_SERVICE_URL: http://ai-service:8000
      AI_PROXY_TIMEOUT_MS: 60000
      INVOICE_PROXY_TIMEOUT_MS: 120000
    networks:
      - fintech_net

  # Identity Service (Port 3001)
  service-identity:
    build: ./service-identity
    container_name: service-identity
    restart: on-failure
    ports:
      - "3001:3001"
    depends_on:
      mongo-db:
        condition: service_healthy
    env_file:
      - ./service-identity/.env
    environment:
      NODE_ENV: development
    networks:
      - fintech_net

  # Wallet Service (Port 3002)
  service-wallet:
    build: ./service-wallet
    container_name: service-wallet
    restart: on-failure
    ports:
      - "3002:3002"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./service-wallet/.env
    environment:
      NODE_ENV: development
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - fintech_net

  # Transaction Service (Port 3003)
  service-transaction:
    build: ./service-transaction
    container_name: service-transaction
    restart: on-failure
    ports:
      - "3003:3003"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./service-transaction/.env
      - ./ai-service/.env
    environment:
      NODE_ENV: development
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      GEMINI_INVOICE_MODEL: gemini-2.5-flash
      GOOGLE_APPLICATION_CREDENTIALS: /app/config/gen-lang-client-0231948223-845422dd2868.json
      GOOGLE_CLOUD_PROJECT: gen-lang-client-0231948223
    volumes:
      - ./ai-service/config:/app/config:ro
    networks:
      - fintech_net

  # Analytics Service (Port 3004)
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    restart: on-failure
    ports:
      - "3004:3004"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./analytics-service/.env
    environment:
      NODE_ENV: development
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - fintech_net

  # Notification Service (Port 3005)
  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: on-failure
    ports:
      - "3005:3005"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./notification-service/.env
    environment:
      NODE_ENV: development
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - fintech_net

  # AI Service (Port 8000)
  ai-service:
    build: ./ai-service
    container_name: ai-service
    restart: on-failure
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AI_SERVICE_PRELOAD_MODELS: "true"
      TORCH_NUM_THREADS: 1
      AI_AUTO_USE_GEMINI: "true"
    volumes:
      - ai_model_cache:/opt/hf-cache
    networks:
      - fintech_net

volumes:
  mongodata:
  rabbitmqdata:
  ai_model_cache:

networks:
  fintech_net:
    driver: bridge
